# Run v2bx from the prebuilt image published by CI.
#   1. mkdir config && v2bx generate -c config/config.json   (or edit by hand)
#   2. docker compose up -d
#
# host networking is used because a node can listen on many ports; the agent
# needs them exposed on the host directly.
services:
  v2bx:
    image: ghcr.io/sakawat-hossain/v2bx:latest
    container_name: v2bx
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./config:/etc/v2bx
